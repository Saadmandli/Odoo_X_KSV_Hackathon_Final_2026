<!--
  The EcoMiles tab mark: a leaf whose midrib is a road, centre line and all.
  One shape carrying both halves of the product.

  Drawn as a filled tile rather than a line mark because a favicon renders at
  16px, where an outline turns to mush and a solid silhouette stays legible.
  Replaces an unrelated purple bolt that arrived with a template.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="15" fill="url(#tile)"/>

  <!-- leaf body -->
  <path d="M17 47 C11 30 22 15 45 13 C47 34 38 49 21 49 Z" fill="#ffffff" fill-opacity="0.95"/>

  <!-- the midrib, drawn heavy enough to read as a road surface -->
  <path d="M18 49 C26 38 34 28 45 13"
        stroke="#047857" stroke-width="3.6" stroke-linecap="round" fill="none"/>

  <!-- centre line: the detail that turns a midrib into a road -->
  <g stroke="#ffffff" stroke-width="1.3" stroke-linecap="round">
    <path d="M23.5 42.5 L26.5 38.5"/>
    <path d="M30 34 L32.5 30.5"/>
    <path d="M36 26 L38 23"/>
  </g>
</svg>
